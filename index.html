<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->

    <title>The Fitness Ladder</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.sound@0.2.0/dist/p5.sound.min.js"></script>
  </head>

  <body>
    <div class="intro-screen">
      <h1 class="title">The Fitness Ladder</h1>
      <h2 class="description">about + description</h2>

      <div class="player-choice">
        <h3>Number of Players</h3>
        <button class="player-btn" data-val="1">1 Player</button>
        <button class="player-btn" data-val="2">2 Players</button>
        <button class="player-btn" data-val="3">3 Players</button>
        <button class="player-btn" data-val="4">4 Players</button>
      </div>

      <!-- <div class="difficulty-choice">
        <h3>Difficulty</h3>
        <button class="normal-mode-btn" data-val="normal">Normal</button>
        <button class="hard-mode-btn" data-val="hard">Hard</button>
        <p>Normal: Player can does not need exact die roll</p>
        <p>Hard: Player needs exact die roll or will go back</p>
      </div> -->

      <button class="start-game-btn">START GAME</button>

    </div>

    <div class="how-to-play">
      <button class="help-btn">How to Play</button>
      <p class="instructions"> dfsfsfg </p>
    </div>


    <div class="game-screen">
      <script type="text/javascript" src="sketch.js"> </script>
      <script type="text/javascript" src="tile.js"> </script>
      <script type="text/javascript" src="player.js"> </script>
    
      <div class="dice-cont"></div>
      <button type="botton" class="roll-dice-button"> Roll Dice </button>
      <!-- <input type="text" class="move-steps-input" placeholder="Enter the amount of steps"> -->
      <button type="submit" class="move-player-button">Move Player</button>

      <div class="card-piles">
        <button type="button" class="red-card"></button>
        <button type="button" class="blue-card"></button>
        <button type="button" class="green-card"></button>
        <button type="button" class="yellow-card"></button>
      </div>

      <div class="exercise-card">
        <div class="big-red-card"></div>
        <div class="big-blue-card"></div>
        <div class="big-green-card"></div>
        <div class="big-yellow-card"></div>

        <button type="button" class="close-card">Close Card</button>
      </div>

      <div class="restart">
        <button type="button" class="restart-button">Reset Game</button>
      </div>
    </div>
    
  </body>
</html>
